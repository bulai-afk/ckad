# Основной домен: центр-каталогизации.рф
# Зеркала (только HTTP → основной HTTPS): центркаталогизации.рф, centrcatalog.ru
#
# Сертификаты Timeweb / Let's Encrypt — положить на сервер:
#   /etc/ssl/ckad/fullchain.pem  (сертификат + промежуточный)
#   /etc/ssl/ckad/privkey.pem

map $host $ckad_canonical_host {
    default "центр-каталогизации.рф";
}

# Зеркала и www → основной домен по HTTP
server {
    listen 80;
    listen [::]:80;
    server_name
        xn--80aaalhpgcamnurx3ad5do.xn--p1ai
        www.xn--80aaalhpgcamnurx3ad5do.xn--p1ai
        центркаталогизации.рф
        www.центркаталогизации.рф
        centrcatalog.ru
        www.centrcatalog.ru;

    return 301 https://$ckad_canonical_host$request_uri;
}

# Основной домен: HTTP → HTTPS (без www)
server {
    listen 80;
    listen [::]:80;
    server_name
        xn----8sbaaoishcaoovty5ae8dp.xn--p1ai
        www.xn----8sbaaoishcaoovty5ae8dp.xn--p1ai
        центр-каталогизации.рф
        www.центр-каталогизации.рф;

    return 301 https://$ckad_canonical_host$request_uri;
}

# Прямой заход по IP — оставляем HTTP (для деплоя и отладки)
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    include /etc/nginx/snippets/ckad-proxy.inc;
}

# www → без www на HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name
        www.xn----8sbaaoishcaoovty5ae8dp.xn--p1ai
        www.центр-каталогизации.рф;

    ssl_certificate /etc/ssl/ckad/fullchain.pem;
    ssl_certificate_key /etc/ssl/ckad/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:CKAD_SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    return 301 https://$ckad_canonical_host$request_uri;
}

# Основной сайт по HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name
        xn----8sbaaoishcaoovty5ae8dp.xn--p1ai
        центр-каталогизации.рф;

    ssl_certificate /etc/ssl/ckad/fullchain.pem;
    ssl_certificate_key /etc/ssl/ckad/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:CKAD_SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    include /etc/nginx/snippets/ckad-proxy.inc;
}
