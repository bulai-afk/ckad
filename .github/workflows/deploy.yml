name: Deploy to Selectel

on:
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate secrets
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.DEPLOY_HOST }}" ]; then
            echo "::error title=Missing secret::DEPLOY_HOST is not set in repo secrets"
            exit 1
          fi
          if [ -z "${{ secrets.DEPLOY_USER }}" ]; then
            echo "::error title=Missing secret::DEPLOY_USER is not set in repo secrets"
            exit 1
          fi
          if [ -z "${{ secrets.DEPLOY_SSH_KEY }}" ]; then
            echo "::error title=Missing secret::DEPLOY_SSH_KEY is not set in repo secrets"
            exit 1
          fi

      - name: Setup SSH key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
          printf "\nHost *\n  StrictHostKeyChecking yes\n  IdentityFile ~/.ssh/id_ed25519\n" >> ~/.ssh/config

      - name: Rsync code to server
        shell: bash
        run: |
          set -euo pipefail
          rsync -az --delete \
            --exclude ".git" \
            --exclude "**/node_modules" \
            --exclude "**/.next" \
            --exclude "**/dist" \
            --exclude "**/.env" \
            --exclude "**/.env.*" \
            ./ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/ckad/current/"

      - name: Build and restart services
        shell: bash
        run: |
          set -euo pipefail
          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" "set -euo pipefail
            if ! swapon --show | grep -q '/swapfile'; then
              echo '[deploy] no swapfile, creating 4G swap...'
              fallocate -l 4G /swapfile || dd if=/dev/zero of=/swapfile bs=1M count=4096
              chmod 600 /swapfile
              mkswap /swapfile
              swapon /swapfile
              grep -q '^/swapfile ' /etc/fstab || echo '/swapfile none swap sw 0 0' >> /etc/fstab
            fi

            cd /opt/ckad/current/backend
            npm ci --no-audit --no-fund
            npm run prisma:generate
                   # Apply DB migrations (idempotent)
                   set -a
                   . /opt/ckad/shared/env/backend.env
                   set +a
                   npx prisma migrate deploy
                   npm run migrate:seed-admin-demo || true
            npm run build

            cd /opt/ckad/current/frontend
            npm ci --no-audit --no-fund
            npm run build

            systemctl restart ckad-backend ckad-frontend
            systemctl --no-pager -l status ckad-backend ckad-frontend
          "

      - name: Health check
        shell: bash
        run: |
          set -euo pipefail
          curl -fsS "https://old.angel-dress.ru/" >/dev/null
          curl -fsS "https://old.angel-dress.ru/api/pages" >/dev/null

