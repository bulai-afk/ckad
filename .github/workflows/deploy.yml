name: Deploy to Selectel

on:
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate secrets
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for k in DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY; do
            if [ -z "${{ secrets[k] }}" ]; then
              echo "::error title=Missing secret::$k is not set in repo secrets"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Setup SSH key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
          printf "\nHost *\n  StrictHostKeyChecking yes\n  IdentityFile ~/.ssh/id_ed25519\n" >> ~/.ssh/config

      - name: Rsync code to server
        shell: bash
        run: |
          set -euo pipefail
          rsync -az --delete \
            --exclude ".git" \
            --exclude "**/node_modules" \
            --exclude "**/.next" \
            --exclude "**/dist" \
            --exclude "**/.env" \
            --exclude "**/.env.*" \
            ./ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/ckad/current/"

      - name: Build and restart services
        shell: bash
        run: |
          set -euo pipefail
          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" "set -euo pipefail
            cd /opt/ckad/current/backend
            npm ci
            npm run prisma:generate
            npm run build

            cd /opt/ckad/current/frontend
            npm ci
            npm run build

            systemctl restart ckad-backend ckad-frontend
            systemctl --no-pager -l status ckad-backend ckad-frontend
          "

      - name: Health check
        shell: bash
        run: |
          set -euo pipefail
          curl -fsS "https://old.angel-dress.ru/" >/dev/null
          curl -fsS "https://old.angel-dress.ru/api/pages" >/dev/null

