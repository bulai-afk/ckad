name: Deploy to Selectel

on:
  push:
    branches: [main]

# Убирает предупреждение про Node 20 у actions (checkout и др.) — см. GitHub changelog 2025-09-19
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  # Два независимых job — backend и frontend собираются параллельно (быстрее, отдельные логи).
  build-backend:
    name: CI — backend (install, Prisma, build)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Backend — npm ci
        working-directory: backend
        run: |
          set -euo pipefail
          npm ci --no-audit --no-fund

      - name: Backend — Prisma generate
        working-directory: backend
        run: |
          set -euo pipefail
          npm run prisma:generate

      - name: Backend — TypeScript build
        working-directory: backend
        run: |
          set -euo pipefail
          npm run build

  build-frontend:
    name: CI — frontend (install, build)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend — npm ci
        working-directory: frontend
        run: |
          set -euo pipefail
          npm ci --no-audit --no-fund

      - name: Frontend — Next.js build
        working-directory: frontend
        run: |
          set -euo pipefail
          npm run build

  deploy:
    name: Deploy — rsync + server build + restart
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Корень приложения на сервере (каталог, куда rsync кладёт репозиторий).
    # По умолчанию /opt/ckad/current — можно переопределить: Settings → Variables → DEPLOY_APP_ROOT
    env:
      DEPLOY_APP_ROOT: ${{ vars.DEPLOY_APP_ROOT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate secrets
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.DEPLOY_HOST }}" ]; then
            echo "::error title=Missing secret::DEPLOY_HOST is not set in repo secrets"
            exit 1
          fi
          if [ -z "${{ secrets.DEPLOY_USER }}" ]; then
            echo "::error title=Missing secret::DEPLOY_USER is not set in repo secrets"
            exit 1
          fi
          if [ -z "${{ secrets.DEPLOY_SSH_KEY }}" ]; then
            echo "::error title=Missing secret::DEPLOY_SSH_KEY is not set in repo secrets"
            exit 1
          fi

      - name: Setup SSH key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
          printf "\nHost *\n  StrictHostKeyChecking yes\n  IdentityFile ~/.ssh/id_ed25519\n" >> ~/.ssh/config

      - name: Rsync — код на сервер
        shell: bash
        env:
          DEPLOY_APP_ROOT: ${{ vars.DEPLOY_APP_ROOT }}
        run: |
          set -euo pipefail
          APP="${DEPLOY_APP_ROOT:-/opt/ckad/current}"
          echo "::notice::Deploy path (APP)=$APP"
          # backend/data — рабочие JSON на сервере; не затирать версией из git
          rsync -az --delete \
            --exclude ".git" \
            --exclude "**/node_modules" \
            --exclude "**/.next" \
            --exclude "**/dist" \
            --exclude "**/.env" \
            --exclude "**/.env.*" \
            --exclude "backend/data/" \
            ./ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${APP}/"
          echo "::notice::Rsync finished — проверка backend на сервере:"
          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" "set -euo pipefail; test -f \"${APP}/backend/package.json\" && head -n 5 \"${APP}/backend/package.json\" || { echo \"backend/package.json missing under ${APP}\"; exit 1; }"

      - name: SSH — swap (один раз на VPS)
        shell: bash
        env:
          DEPLOY_APP_ROOT: ${{ vars.DEPLOY_APP_ROOT }}
        run: |
          set -euo pipefail
          APP="${DEPLOY_APP_ROOT:-/opt/ckad/current}"
          echo "::notice::[deploy] swap check (APP=$APP)"
          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" "set -euo pipefail
            if ! swapon --show | grep -q '/swapfile'; then
              echo '[deploy] no swapfile, creating 4G swap...'
              fallocate -l 4G /swapfile || dd if=/dev/zero of=/swapfile bs=1M count=4096
              chmod 600 /swapfile
              mkswap /swapfile
              swapon /swapfile
              grep -q '^/swapfile ' /etc/fstab || echo '/swapfile none swap sw 0 0' >> /etc/fstab
            fi
            echo '[deploy] swap OK'
          "

      - name: SSH — сборка backend и frontend (параллельно на сервере)
        shell: bash
        env:
          DEPLOY_APP_ROOT: ${{ vars.DEPLOY_APP_ROOT }}
        run: |
          set -euo pipefail
          APP="${DEPLOY_APP_ROOT:-/opt/ckad/current}"
          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" "set -euo pipefail
            ROOT=\"$APP\"
            echo \"[deploy] ROOT=\$ROOT — parallel npm ci + build (backend + frontend)\"
            build_backend() {
              set -euo pipefail
              echo '[deploy:backend] start'
              cd \"\$ROOT/backend\"
              npm ci --no-audit --no-fund
              npm run prisma:generate
              set -a
              . /opt/ckad/shared/env/backend.env
              set +a
              npx prisma migrate deploy
              npm run build
              echo '[deploy:backend] done'
            }
            build_frontend() {
              set -euo pipefail
              echo '[deploy:frontend] start'
              cd \"\$ROOT/frontend\"
              npm ci --no-audit --no-fund
              npm run build
              echo '[deploy:frontend] done'
            }
            build_backend &
            _b=\$!
            build_frontend &
            _f=\$!
            wait \$_b
            _be=\$?
            wait \$_f
            _fe=\$?
            if [ \"\$_be\" -ne 0 ]; then
              echo \"::error::Backend build failed (exit \$_be)\"
              exit \$_be
            fi
            if [ \"\$_fe\" -ne 0 ]; then
              echo \"::error::Frontend build failed (exit \$_fe)\"
              exit \$_fe
            fi
            echo '[deploy] backend + frontend builds OK'
          "

      - name: SSH — restart systemd и права на backend/data
        shell: bash
        env:
          DEPLOY_APP_ROOT: ${{ vars.DEPLOY_APP_ROOT }}
        run: |
          set -euo pipefail
          APP="${DEPLOY_APP_ROOT:-/opt/ckad/current}"
          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" "set -euo pipefail
            ROOT=\"$APP\"
            systemctl restart ckad-backend ckad-frontend
            systemctl --no-pager -l status ckad-backend ckad-frontend
            mkdir -p \"\$ROOT/backend/data\"
            chown -R www-data:www-data \"\$ROOT/backend/data\"
            chmod -R u+rwX \"\$ROOT/backend/data\"
            echo '[deploy] backend/data permissions OK'
          "

      - name: Health check (site + API via Next BFF)
        shell: bash
        env:
          SITE_URL: ${{ secrets.DEPLOY_SITE_URL }}
        run: |
          set -euo pipefail
          if [ -z "${SITE_URL:-}" ]; then
            echo "::warning::DEPLOY_SITE_URL is not set — skipping health check. Add repo secret DEPLOY_SITE_URL (public HTTPS origin, e.g. https://example.com, no trailing slash)."
            exit 0
          fi
          BASE="${SITE_URL%/}"
          curl_retry() {
            local url="$1"
            local attempt
            for attempt in $(seq 1 15); do
              if curl -fsS --max-time 30 -o /dev/null -w '' "$url"; then
                echo "OK $url"
                return 0
              fi
              echo "Health check attempt $attempt/15 failed for $url, retrying in 5s..."
              sleep 5
            done
            echo "::error::Health check failed after 15 attempts: $url"
            return 1
          }
          curl_retry "$BASE/"
          for path in \
            /api/pages \
            /api/pages/folders \
            /api/pages/partners \
            /api/pages/reviews \
            /api/pages/banners \
            /api/pages/site-settings
          do
            curl_retry "$BASE$path"
          done
