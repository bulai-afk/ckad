name: Deploy to Selectel

on:
  push:
    branches: [main]

# Убирает предупреждение про Node 20 у actions (checkout и др.) — см. GitHub changelog 2025-09-19
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  ci:
    name: Build backend & frontend
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Backend — install, Prisma, build
        working-directory: backend
        run: |
          set -euo pipefail
          npm ci --no-audit --no-fund
          npm run prisma:generate
          npm run build

      - name: Frontend — install, build
        working-directory: frontend
        run: |
          set -euo pipefail
          npm ci --no-audit --no-fund
          npm run build

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    # Корень приложения на сервере (каталог, куда rsync кладёт репозиторий).
    # По умолчанию /opt/ckad/current — можно переопределить: Settings → Secrets and variables → Actions → Variables → DEPLOY_APP_ROOT
    env:
      DEPLOY_APP_ROOT: ${{ vars.DEPLOY_APP_ROOT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate secrets
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.DEPLOY_HOST }}" ]; then
            echo "::error title=Missing secret::DEPLOY_HOST is not set in repo secrets"
            exit 1
          fi
          if [ -z "${{ secrets.DEPLOY_USER }}" ]; then
            echo "::error title=Missing secret::DEPLOY_USER is not set in repo secrets"
            exit 1
          fi
          if [ -z "${{ secrets.DEPLOY_SSH_KEY }}" ]; then
            echo "::error title=Missing secret::DEPLOY_SSH_KEY is not set in repo secrets"
            exit 1
          fi

      - name: Setup SSH key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
          printf "\nHost *\n  StrictHostKeyChecking yes\n  IdentityFile ~/.ssh/id_ed25519\n" >> ~/.ssh/config

      - name: Rsync code to server
        shell: bash
        env:
          DEPLOY_APP_ROOT: ${{ vars.DEPLOY_APP_ROOT }}
        run: |
          set -euo pipefail
          APP="${DEPLOY_APP_ROOT:-/opt/ckad/current}"
          echo "::notice::Deploy path (APP)=$APP"
          rsync -az --delete \
            --exclude ".git" \
            --exclude "**/node_modules" \
            --exclude "**/.next" \
            --exclude "**/dist" \
            --exclude "**/.env" \
            --exclude "**/.env.*" \
            ./ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${APP}/"

      - name: Build and restart services
        shell: bash
        env:
          DEPLOY_APP_ROOT: ${{ vars.DEPLOY_APP_ROOT }}
        run: |
          set -euo pipefail
          APP="${DEPLOY_APP_ROOT:-/opt/ckad/current}"
          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" "set -euo pipefail
            ROOT=\"$APP\"
            echo \"[deploy] ROOT=\$ROOT\"

            if ! swapon --show | grep -q '/swapfile'; then
              echo '[deploy] no swapfile, creating 4G swap...'
              fallocate -l 4G /swapfile || dd if=/dev/zero of=/swapfile bs=1M count=4096
              chmod 600 /swapfile
              mkswap /swapfile
              swapon /swapfile
              grep -q '^/swapfile ' /etc/fstab || echo '/swapfile none swap sw 0 0' >> /etc/fstab
            fi

            cd \"\$ROOT/backend\"
            npm ci --no-audit --no-fund
            npm run prisma:generate
                   set -a
                   . /opt/ckad/shared/env/backend.env
                   set +a
                   npx prisma migrate deploy
                   npm run migrate:seed-admin-demo || true
            npm run build

            cd \"\$ROOT/frontend\"
            npm ci --no-audit --no-fund
            npm run build

            systemctl restart ckad-backend ckad-frontend
            systemctl --no-pager -l status ckad-backend ckad-frontend

            # JSON-файлы (banners, partners, partners.json и т.д.) должны быть доступны процессу backend (www-data)
            mkdir -p \"\$ROOT/backend/data\"
            chown -R www-data:www-data \"\$ROOT/backend/data\"
            chmod -R u+rwX \"\$ROOT/backend/data\"
            echo '[deploy] backend/data permissions OK'
          "

      - name: Health check (site + API via Next BFF)
        shell: bash
        env:
          SITE_URL: ${{ secrets.DEPLOY_SITE_URL }}
        run: |
          set -euo pipefail
          if [ -z "${SITE_URL:-}" ]; then
            echo "::warning::DEPLOY_SITE_URL is not set — skipping health check. Add repo secret DEPLOY_SITE_URL (public HTTPS origin, e.g. https://example.com, no trailing slash)."
            exit 0
          fi
          BASE="${SITE_URL%/}"
          curl_retry() {
            local url="$1"
            local attempt
            for attempt in $(seq 1 15); do
              if curl -fsS --max-time 30 -o /dev/null -w '' "$url"; then
                echo "OK $url"
                return 0
              fi
              echo "Health check attempt $attempt/15 failed for $url, retrying in 5s..."
              sleep 5
            done
            echo "::error::Health check failed after 15 attempts: $url"
            return 1
          }
          curl_retry "$BASE/"
          for path in \
            /api/pages \
            /api/pages/folders \
            /api/pages/partners \
            /api/pages/reviews \
            /api/pages/banners \
            /api/pages/site-settings
          do
            curl_retry "$BASE$path"
          done
