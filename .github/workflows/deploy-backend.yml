name: Deploy Backend to Selectel

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "deploy/**"
      - ".github/workflows/deploy-backend.yml"

concurrency:
  group: deploy-backend-main
  cancel-in-progress: true

jobs:
  build-backend:
    name: CI — backend (install, Prisma, build)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Backend — npm ci
        working-directory: backend
        run: |
          set -euo pipefail
          npm ci --no-audit --no-fund

      - name: Backend — Prisma generate
        working-directory: backend
        run: |
          set -euo pipefail
          npm run prisma:generate

      - name: Backend — TypeScript build
        working-directory: backend
        run: |
          set -euo pipefail
          npm run build

  deploy-backend:
    name: Deploy backend — rsync + build + restart
    needs: [build-backend]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DEPLOY_APP_ROOT: ${{ vars.DEPLOY_APP_ROOT }}
      DEPLOY_HOST: 77.223.99.120
      DEPLOY_USER: root
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate secrets
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.DEPLOY_SSH_KEY }}" ]; then
            echo "::error title=Missing secret::DEPLOY_SSH_KEY is not set in repo secrets"
            exit 1
          fi

      - name: Setup SSH key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts 2>/dev/null
          printf "\nHost *\n  StrictHostKeyChecking yes\n  IdentityFile ~/.ssh/id_ed25519\n" >> ~/.ssh/config

      - name: SSH — bootstrap server (Node, DB, systemd)
        shell: bash
        run: |
          set -euo pipefail
          rsync -az ./deploy/ "${DEPLOY_USER}@${DEPLOY_HOST}:/opt/ckad/deploy/"
          ssh "${DEPLOY_USER}@${DEPLOY_HOST}" "bash /opt/ckad/deploy/bootstrap-server.sh"

      - name: Rsync — backend code to server
        shell: bash
        run: |
          set -euo pipefail
          APP="${DEPLOY_APP_ROOT:-/opt/ckad/current}"
          echo "::notice::Deploy backend to ${DEPLOY_USER}@${DEPLOY_HOST} path (APP)=$APP"
          ssh "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p \"${APP}/backend\""
          rsync -az --delete \
            --exclude ".env" \
            --exclude ".env.*" \
            --exclude "node_modules" \
            --exclude "dist" \
            --exclude "data/" \
            ./backend/ "${DEPLOY_USER}@${DEPLOY_HOST}:${APP}/backend/"

      - name: SSH — ensure swap
        shell: bash
        run: |
          set -euo pipefail
          ssh "${DEPLOY_USER}@${DEPLOY_HOST}" "set -euo pipefail
            if ! swapon --show | grep -q '/swapfile'; then
              echo '[deploy] no swapfile, creating 4G swap...'
              fallocate -l 4G /swapfile || dd if=/dev/zero of=/swapfile bs=1M count=4096
              chmod 600 /swapfile
              mkswap /swapfile
              swapon /swapfile
              grep -q '^/swapfile ' /etc/fstab || echo '/swapfile none swap sw 0 0' >> /etc/fstab
            fi
            echo '[deploy] swap OK'
          "

      - name: SSH — backend build, migrate, restart
        shell: bash
        run: |
          set -euo pipefail
          APP="${DEPLOY_APP_ROOT:-/opt/ckad/current}"
          ssh "${DEPLOY_USER}@${DEPLOY_HOST}" "set -euo pipefail
            export PATH=\"/usr/local/bin:/usr/bin:\$PATH\"
            ROOT=\"$APP\"
            cd \"\$ROOT/backend\"
            npm ci --no-audit --no-fund
            npm run prisma:generate
            set -a
            . /opt/ckad/shared/env/backend.env
            set +a
            npx prisma migrate deploy
            npm run build
            mkdir -p \"\$ROOT/backend/data\"
            chown -R www-data:www-data \"\$ROOT/backend/data\"
            chmod -R u+rwX \"\$ROOT/backend/data\"
            systemctl restart ckad-backend
            systemctl --no-pager -l status ckad-backend
          "

      - name: Health check — API via Next BFF
        shell: bash
        env:
          SITE_URL: ${{ secrets.DEPLOY_SITE_URL }}
        run: |
          set -euo pipefail
          bash deploy/ci-health-check.sh backend "${DEPLOY_USER}" "${DEPLOY_HOST}" "${SITE_URL:-}"
